name: Reusable Docker Image Pipeline

on:
  workflow_call:
    inputs:
      service_name:
        description: "Service name"
        required: true
        type: string
      service_path:
        description: "Service folder path"
        required: true
        type: string
      gitops_branch:
        description: "GitOps branch to update"
        required: false
        type: string
        default: "feature-branch"
    secrets:
      GHCR_TOKEN:
        description: "GitHub Container Registry token"
        required: true
      GITOPS_TOKEN:
        description: "Token with write access to MedicoJobs/medicojob-gitops"
        required: true

permissions:
  contents: read
  packages: write
  security-events: write

env:
  GITOPS_REPO: MedicoJobs/medicojob-gitops

jobs:
  docker-image:
    name: "${{ inputs.service_name }} docker image"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare user-service image and GitOps metadata
        id: image
        shell: bash
        run: |
          short_sha="$(echo "${{ github.sha }}" | cut -c1-7)"
          service="user-service"
          image="ghcr.io/medicojobs/medicojob-user-service"
          values_file="helm/apps/user-service/values-dev.yaml"

          if [ "${{ inputs.service_name }}" != "$service" ]; then
            echo "This workflow is configured for user-service only, got '${{ inputs.service_name }}'."
            exit 1
          fi

          echo "service=${service}" >> "$GITHUB_OUTPUT"
          echo "name=${image}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${short_sha}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=${image}:${short_sha}" >> "$GITHUB_OUTPUT"
          echo "latest_tag=${image}:latest" >> "$GITHUB_OUTPUT"
          echo "values_file=${values_file}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.service_path }}
          file: ${{ inputs.service_path }}/Dockerfile
          load: true
          push: false
          tags: |
            ${{ steps.image.outputs.sha_tag }}
            ${{ steps.image.outputs.latest_tag }}

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: ${{ steps.image.outputs.sha_tag }}
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Push Docker image to GHCR
        shell: bash
        run: |
          docker push "${{ steps.image.outputs.sha_tag }}"
          docker push "${{ steps.image.outputs.latest_tag }}"

      - name: Validate GitOps token
        shell: bash
        env:
          GITOPS_TOKEN: ${{ secrets.GITOPS_TOKEN }}
        run: |
          if [ -z "$GITOPS_TOKEN" ]; then
            echo "GITOPS_TOKEN is missing. Add a repository or organization secret named GITOPS_TOKEN with write access to MedicoJobs/medicojob-gitops."
            exit 1
          fi

      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPO }}
          ref: ${{ inputs.gitops_branch }}
          token: ${{ secrets.GITOPS_TOKEN }}
          path: gitops

      - name: Install yq
        shell: bash
        run: |
          sudo wget -q https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64 -O /usr/local/bin/yq
          sudo chmod +x /usr/local/bin/yq

      - name: Update user-service Helm image tag in GitOps
        working-directory: gitops
        shell: bash
        env:
          IMAGE_NAME: ${{ steps.image.outputs.name }}
          SHORT_SHA: ${{ steps.image.outputs.short_sha }}
          VALUES_FILE: ${{ steps.image.outputs.values_file }}
        run: |
          yq -i '.image.repository = strenv(IMAGE_NAME) | .image.tag = strenv(SHORT_SHA) | .image.pullPolicy = "IfNotPresent"' "$VALUES_FILE"

      - name: Commit and push GitOps change
        working-directory: gitops
        shell: bash
        run: |
          git config user.name "medicojob-ci"
          git config user.email "medicojob-ci@users.noreply.github.com"
          git add "${{ steps.image.outputs.values_file }}"
          git commit -m "deploy(${{ steps.image.outputs.service }}): ${{ steps.image.outputs.short_sha }} to dev" || exit 0
          git push origin "${{ inputs.gitops_branch }}"
