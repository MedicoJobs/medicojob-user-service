name: user-service CI Pipeline

on:
  push:
    branches:
      - main
      - feature-branch
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  pipeline:
    uses: ./.github/workflows/ci_service_pipeline.yml
    with:
      service_name: user-service
      service_path: .
      sonar_project_key: medicojob-user-service
      sonar_token_secret_name: SONAR_TOKEN
    secrets: inherit
