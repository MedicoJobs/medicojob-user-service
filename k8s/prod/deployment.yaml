apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: prod
  name: user-service
  labels:
    app: user-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      automountServiceAccountToken: false
      containers:
      - name: user-service
        image: pavithrasambath2003/user-service:v1
        imagePullPolicy: IfNotPresent
        resources:
          requests:
            cpu: 250m
            memory: 256Mi
            ephemeral-storage: 512Mi
          limits:
            memory: 512Mi
        readinessProbe:
          tcpSocket:
            port: 5001
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          tcpSocket:
            port: 5001
          initialDelaySeconds: 15
          periodSeconds: 20
        ports:
        - containerPort: 5001
        env:
        - name: PORT
          value: "5001"
        envFrom:
        - configMapRef:
            name: medicojob-config
        - secretRef:
            name: medicojob-secrets



